<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Shop</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5faff;
    }

    .shop-container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .shop-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
      color: #0072ff;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .shop-card {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0, 114, 255, 0.2);
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }

    .shop-card:hover {
      transform: scale(1.03);
    }

    .shop-card img {
      max-width: 100%;
      height: 120px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .item-name {
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .item-power {
      color: #28a745;
      margin-bottom: 10px;
    }

    .item-cost {
      font-weight: bold;
      color: #ff8c00;
    }

    .item-cost .fa-coins {
      color: #ffc107;
    }

    .item-cost .fa-money-bill {
      color: #28a745;
    }
  </style>
</head>
<body>

  <!-- Shared Header -->
  <header>
    <div class="header-container">
      <h1 class="game-title">Game Shop</h1>
    </div>
  </header>

  <!-- Shop Content -->
  <div class="shop-container">
    <h2 class="shop-title">Shop Items</h2>
    <div class="shop-grid">
      
      <!-- Coin Items -->
      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Sword">
        <div class="item-name">Iron Sword</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 25</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 300</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Shield">
        <div class="item-name">Steel Shield</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 20</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 250</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Boots">
        <div class="item-name">Speed Boots</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 15</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 180</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Helmet">
        <div class="item-name">Warrior Helmet</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 18</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 220</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Gloves">
        <div class="item-name">Battle Gloves</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 12</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 150</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Armor">
        <div class="item-name">Light Armor</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 30</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 400</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Ring">
        <div class="item-name">Power Ring</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 22</div>
        <div class="item-cost"><i class="fas fa-coins"></i> 280</div>
      </div>

      <!-- Real Money Items -->
      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Dragon Blade">
        <div class="item-name">Dragon Blade</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 70</div>
        <div class="item-cost"><i class="fas fa-money-bill"></i> ₹199</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Phoenix Armor">
        <div class="item-name">Phoenix Armor</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 65</div>
        <div class="item-cost"><i class="fas fa-money-bill"></i> ₹149</div>
      </div>

      <div class="shop-card">
        <img src="https://via.placeholder.com/150" alt="Legend Pack">
        <div class="item-name">Legend Pack</div>
        <div class="item-power"><i class="fas fa-bolt"></i> Power: 90</div>
        <div class="item-cost"><i class="fas fa-money-bill"></i> ₹299</div>
      </div>

    </div>
  </div>

</body>
</html>
