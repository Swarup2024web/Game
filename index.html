<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mytho Wars</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <header>
    <h1><i class="fas fa-dragon"></i> Mytho Wars</h1>
    <nav>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="notifications.html"><i class="fas fa-bell"></i></a>
      <a href="messages.html"><i class="fas fa-envelope"></i></a>
    </nav>
  </header>

  <div class="container">
    <div class="card" onclick="location.href='boss.html'">
      <i class="fas fa-skull-crossbones"></i>
      <h3>Boss Fight</h3>
    </div>
    <div class="card" onclick="location.href='pvp.html'">
      <i class="fas fa-crosshairs"></i>
      <h3>PvP Arena</h3>
    </div>
    <div class="card" onclick="location.href='shop.html'">
      <i class="fas fa-store"></i>
      <h3>Shop</h3>
    </div>
    <div class="card" onclick="location.href='inventory.html'">
      <i class="fas fa-box-open"></i>
      <h3>Inventory</h3>
    </div>
    <div class="card" onclick="location.href='leaderboard.html'">
      <i class="fas fa-trophy"></i>
      <h3>Leaderboard</h3>
    </div>
    <div class="card" onclick="location.href='rewards.html'">
      <i class="fas fa-gift"></i>
      <h3>Daily Rewards</h3>
    </div>
  </div>
</body>
</html>
