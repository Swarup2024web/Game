<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Myth Battles</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://kit.fontawesome.com/a2e0e6b15a.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-row1">
      <h1>⚔️ MYTH BATTLES</h1>
    </div>

    <div class="header-row2">
      <a href="profile.html" title="Profile"><i class="fas fa-user-circle"></i></a>
      <a href="notifications.html" title="Notifications">
        <i class="fas fa-bell"></i><span class="badge">3</span>
      </a>
      <a href="messages.html" title="Messages">
        <i class="fas fa-envelope"></i><span class="badge">5</span>
      </a>
    </div>

    <div class="header-row3">
      <span><i class="fas fa-bolt"></i> Power: 150</span>
      <span><i class="fas fa-star"></i> Level: 8</span>
      <span><i class="fas fa-brain"></i> Skill Points: 12</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="card" onclick="location.href='rewards.html'">
      <i class="fas fa-gift fa-2x"></i>
      <h3>Daily Rewards</h3>
    </div>

    <div class="card" onclick="location.href='boss.html'">
      <i class="fas fa-dragon fa-2x"></i>
      <h3>Boss Fight</h3>
    </div>

    <div class="card" onclick="location.href='pvp.html'">
      <i class="fas fa-crosshairs fa-2x"></i>
      <h3>PvP Arena</h3>
    </div>

    <div class="card" onclick="location.href='shop.html'">
      <i class="fas fa-store fa-2x"></i>
      <h3>Shop</h3>
    </div>

    <div class="card" onclick="location.href='inventory.html'">
      <i class="fas fa-box-open fa-2x"></i>
      <h3>Inventory</h3>
    </div>

    <div class="card" onclick="location.href='leaderboard.html'">
      <i class="fas fa-trophy fa-2x"></i>
      <h3>Leaderboard</h3>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
