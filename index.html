<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header Row 1: Website Title -->
  <header class="header">
    <h1>🔥 Hero Legends Dashboard 🔥</h1>
  </header>

  <!-- Header Row 2: Profile, Notifications, Messages -->
  <div class="top-bar">
    <div class="nav-item">
      <i class="fas fa-user-circle"></i>
      <span>Profile</span>
    </div>
    <div class="nav-item">
      <i class="fas fa-bell"></i>
      <span>Notifications <span class="count">3</span></span>
    </div>
    <div class="nav-item">
      <i class="fas fa-envelope"></i>
      <span>Messages <span class="count">5</span></span>
    </div>
  </div>

  <!-- Header Row 3: Stats -->
  <div class="stats-bar">
    <div class="stat">
      <i class="fas fa-bolt"></i>
      <span>Power: <strong>9200</strong></span>
    </div>
    <div class="stat">
      <i class="fas fa-star"></i>
      <span>Level: <strong>25</strong></span>
    </div>
    <div class="stat">
      <i class="fas fa-coins"></i>
      <span>Skill Points: <strong>12</strong></span>
    </div>
  </div>

  <!-- Dashboard Cards -->
  <div class="card-container">
    <a href="rewards.html" class="card">
      <i class="fas fa-gift"></i>
      <span>Daily Rewards</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="boss.html" class="card">
      <i class="fas fa-dragon"></i>
      <span>Boss Fight</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="pvp.html" class="card">
      <i class="fas fa-crosshairs"></i>
      <span>PvP Arena</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="shop.html" class="card">
      <i class="fas fa-shopping-cart"></i>
      <span>Shop</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="inventory.html" class="card">
      <i class="fas fa-boxes"></i>
      <span>Inventory</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="leaderboard.html" class="card">
      <i class="fas fa-medal"></i>
      <span>Leaderboard</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guild.html" class="card">
      <i class="fas fa-users"></i>
      <span>Guild</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guildwar.html" class="card">
      <i class="fas fa-fire"></i>
      <span>Guild War</span>
      <i class="fas fa-chevron-right"></i>
    </a>
  </div>

  <script src="script.js"></script>
</body>
      </html>
