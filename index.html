<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Myth Battles</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <header>
    <h1>⚔️ MYTH BATTLES ⚔️</h1>
    <p>Mythological Heroes vs Evil Forces</p>
  </header>

  <section class="stats">
    <div>🧠 EXP: <span id="exp">0</span></div>
    <div>💰 Gold: <span id="gold">0</span></div>
    <div>🏆 Wins: <span id="wins">0</span></div>
  </section>

  <section class="battle-area">
    <div class="hero-section">
      <h2>🧙‍♂️ Your Hero</h2>
      <select id="heroSelect">
        <option value="rama">Rama</option>
        <option value="krishna">Krishna</option>
        <option value="durga">Durga</option>
        <option value="hanuman">Hanuman</option>
      </select>
      <img id="hero-img" src="" alt="Hero" />
      <div class="health-bar">
        <div class="bar" id="hero-health-bar"></div>
      </div>
    </div>

    <div class="vs">VS</div>

    <div class="villain-section">
      <h2>👹 Villain</h2>
      <p id="villain-name">?</p>
      <img id="villain-img" src="" alt="Villain" />
      <div class="health-bar">
        <div class="bar" id="villain-health-bar"></div>
      </div>
    </div>
  </section>

  <section class="controls">
    <button id="attackBtn">⚔️ Attack</button>
    <button id="specialBtn">🔥 Special Power</button>
    <p id="message"></p>
  </section>

  <footer>
    <p>© 2025 Myth Battles. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
