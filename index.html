<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gods in War</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="index.html" class="site-title">Gods in War</a>
  </header>

  <!-- Player Stats -->
  <section class="stats-row">
    <div class="stat-card">
      <i class="fas fa-bolt"></i>
      <span>Power: 990K</span>
    </div>
    <div class="stat-card">
      <i class="fas fa-star"></i>
      <span>Level: 45</span>
    </div>
    <div class="stat-card">
      <i class="fas fa-coins"></i>
      <span>Skill: 75</span>
    </div>
  </section>

  <!-- Functional Cards -->
  <section class="cards">
    <a href="profile.html" class="card">
      <i class="fas fa-user"></i>
      <span>Profile</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="messages.html" class="card">
      <i class="fas fa-envelope"></i>
      <span>Messages</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="notifications.html" class="card">
      <i class="fas fa-bell"></i>
      <span>Notifications</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guild.html" class="card">
      <i class="fas fa-users"></i>
      <span>Guild</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guild-war.html" class="card">
      <i class="fas fa-fire"></i>
      <span>Guild War</span>
      <i class="fas fa-chevron-right"></i>
    </a>
  </section>
</body>
</html>
