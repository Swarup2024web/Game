<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Battle Quest</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <!-- Header: Website name -->
  <header>
    <h1 class="site-title">⚔️ Battle Quest</h1>

    <!-- Row 2: Icons with labels and counts -->
    <div class="top-icons">
      <a href="profile.html" class="icon-link"><i class="fas fa-user"></i> Profile</a>
      <a href="notifications.html" class="icon-link"><i class="fas fa-bell"></i> Notifications <span class="count">3</span></a>
      <a href="messages.html" class="icon-link"><i class="fas fa-envelope"></i> Messages <span class="count">5</span></a>
    </div>

    <!-- Row 3: Stats with glowing effects -->
    <div class="stats-row">
      <div class="stat fire-glow"><i class="fas fa-bolt"></i> 1234</div>
      <div class="stat green-glow"><i class="fas fa-star"></i> Level 25</div>
      <div class="stat blue-glow"><i class="fas fa-magic"></i> 10 SP</div>
    </div>
  </header>

  <!-- Main Cards -->
  <main class="card-container">
    <a href="rewards.html" class="card"><i class="fas fa-gift"></i> <span>Daily Rewards</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="boss.html" class="card"><i class="fas fa-skull-crossbones"></i> <span>Boss Fight</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="pvp.html" class="card"><i class="fas fa-crosshairs"></i> <span>PvP Arena</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="shop.html" class="card"><i class="fas fa-store"></i> <span>Shop</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="inventory.html" class="card"><i class="fas fa-boxes"></i> <span>Inventory</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="leaderboard.html" class="card"><i class="fas fa-crown"></i> <span>Leaderboard</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="guild.html" class="card"><i class="fas fa-users"></i> <span>Guild</span> <i class="fas fa-chevron-right right"></i></a>
    <a href="guildwar.html" class="card"><i class="fas fa-fire"></i> <span>Guild War</span> <i class="fas fa-chevron-right right"></i></a>
  </main>

  <script src="script.js"></script>
</body>
  </html>
