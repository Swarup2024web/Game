<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a2d04a4b2b.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header Row 1: Game Title -->
  <header class="header-row1">
    <h1>🔥 Ultimate Battle RPG 🔥</h1>
  </header>

  <!-- Header Row 2: Profile, Notifications, Messages -->
  <div class="header-row2">
    <div class="nav-item"><i class="fas fa-user-circle"></i> Profile</div>
    <div class="nav-item"><i class="fas fa-bell"></i> Notifications <span class="count">3</span></div>
    <div class="nav-item"><i class="fas fa-envelope"></i> Messages <span class="count">5</span></div>
  </div>

  <!-- Header Row 3: Stats (Power, Level, Skill Points) -->
  <div class="header-row3">
    <div class="stat">
      <i class="fas fa-bolt fire"></i>
      <span>Power: 890</span>
    </div>
    <div class="stat">
      <i class="fas fa-layer-group fire"></i>
      <span>Level: 21</span>
    </div>
    <div class="stat">
      <i class="fas fa-magic fire"></i>
      <span>Skill: 7</span>
    </div>
  </div>

  <!-- Main Game Options -->
  <main class="main-dashboard">

    <a href="rewards.html" class="card">
      <i class="fas fa-gift"></i>
      <span>Rewards</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="boss.html" class="card">
      <i class="fas fa-dragon"></i>
      <span>Boss Fight</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="pvp.html" class="card">
      <i class="fas fa-crosshairs"></i>
      <span>PvP Arena</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="shop.html" class="card">
      <i class="fas fa-store"></i>
      <span>Shop</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="inventory.html" class="card">
      <i class="fas fa-box-open"></i>
      <span>Inventory</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="leaderboard.html" class="card">
      <i class="fas fa-trophy"></i>
      <span>Leaderboard</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="guild.html" class="card">
      <i class="fas fa-users"></i>
      <span>Guild</span>
      <i class="fas fa-chevron-right"></i>
    </a>

    <a href="guildwar.html" class="card">
      <i class="fas fa-fire"></i>
      <span>Guild War</span>
      <i class="fas fa-chevron-right"></i>
    </a>

  </main>

  <script src="script.js"></script>
</body>
</html>
