<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gods in War</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <header>
    <h1><a href="index.html">Gods in War</a></h1>
  </header>

  <section class="stats-row">
    <div class="stat"><i class="fas fa-bolt"></i> Power: 7500</div>
    <div class="stat"><i class="fas fa-star"></i> Level: 35</div>
    <div class="stat"><i class="fas fa-coins"></i> Skill Points: 12</div>
  </section>

  <section class="card-section">
    <a href="profile.html" class="card">
      <i class="fas fa-user"></i>
      <span>Profile</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="messages.html" class="card badge-card">
      <i class="fas fa-envelope"></i>
      <span>Messages</span>
      <span class="badge">3</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="notifications.html" class="card badge-card">
      <i class="fas fa-bell"></i>
      <span>Notifications</span>
      <span class="badge">5</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="rewards.html" class="card">
      <i class="fas fa-gift"></i>
      <span>Rewards</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guild.html" class="card">
      <i class="fas fa-users"></i>
      <span>Guild</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="boss.html" class="card">
      <i class="fas fa-dragon"></i>
      <span>Boss Fight</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="arena.html" class="card">
      <i class="fas fa-swords"></i>
      <span>PvP Arena</span>
      <i class="fas fa-chevron-right"></i>
    </a>
    <a href="guildwar.html" class="card">
      <i class="fas fa-flag-checkered"></i>
      <span>Guild War</span>
      <i class="fas fa-chevron-right"></i>
    </a>
  </section>

  <script src="script.js"></script>
</body>
</html>
