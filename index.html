<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gods in War</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <!-- Website Title -->
    <h1 class="title">
      <a href="index.html">Gods in War</a>
    </h1>

    <!-- XP Progress Bar -->
    <div class="xp-row">
      <span class="level-text">LV 25</span>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" style="width: 60%;"></div>
        </div>
      </div>
      <span class="level-text">LV 26</span>
    </div>

    <!-- Player Stats -->
    <div class="stats-row">
      <div class="stat"><i class="fas fa-bolt"></i><span>9540</span></div>
      <div class="stat"><i class="fas fa-fire"></i><span>12300</span></div>
      <div class="stat"><i class="fas fa-coins"></i><span>212K</span></div>
      <div class="stat"><i class="fas fa-gem"></i><span>110</span></div>
    </div>
  </header>

  <!-- Navigation Cards -->
  <main class="card-container">
    <a href="profile.html" class="card">
      <div class="card-left">
        <i class="fas fa-user"></i><span>Profile</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="messages.html" class="card">
      <div class="card-left">
        <i class="fas fa-envelope"></i><span>Messages</span>
        <span class="badge">5</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="notifications.html" class="card">
      <div class="card-left">
        <i class="fas fa-bell"></i><span>Notifications</span>
        <span class="badge">3</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="rewards.html" class="card">
      <div class="card-left">
        <i class="fas fa-gift"></i><span>Rewards</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="guild.html" class="card">
      <div class="card-left">
        <i class="fas fa-users"></i><span>Guild</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="bossfight.html" class="card">
      <div class="card-left">
        <i class="fas fa-dragon"></i><span>Boss Fight</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="pvparena.html" class="card">
      <div class="card-left">
        <i class="fas fa-crosshairs"></i><span>PvP Arena</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>

    <a href="guildwar.html" class="card">
      <div class="card-left">
        <i class="fas fa-shield-halved"></i><span>Guild War</span>
      </div>
      <i class="fas fa-chevron-right card-chevron"></i>
    </a>
  </main>

  <script src="script.js"></script>
</body>
        </html>
