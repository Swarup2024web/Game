<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My RPG Game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <header>
    <!-- Row 1: Website name -->
    <div class="header-row site-title">
      <h1><i class="fas fa-dragon"></i> RPG QUEST</h1>
    </div>

    <!-- Row 2: Profile, Notifications, Messages -->
    <div class="header-row nav-icons">
      <div class="icon-group">
        <i class="fas fa-user-circle"></i>
      </div>
      <div class="icon-group" id="notif-icon">
        <i class="fas fa-bell"></i>
        <span class="count">2</span>
      </div>
      <div class="icon-group" id="msg-icon">
        <i class="fas fa-envelope"></i>
        <span class="count">5</span>
      </div>
    </div>

    <!-- Row 3: Stats -->
    <div class="header-row stats">
      <div><i class="fas fa-bolt"></i> Power: <span>2100</span></div>
      <div><i class="fas fa-star"></i> Level: <span>18</span></div>
      <div><i class="fas fa-brain"></i> Skill Pts: <span>12</span></div>
    </div>
  </header>

  <main>
    <div class="card-container">
      <div class="card" id="rewards">
        <i class="fas fa-gift card-icon"></i>
        <h2>Rewards</h2>
      </div>
      <div class="card" id="boss">
        <i class="fas fa-skull-crossbones card-icon"></i>
        <h2>Boss Fight</h2>
      </div>
      <div class="card" id="pvp">
        <i class="fas fa-swords card-icon"></i>
        <h2>PvP Arena</h2>
      </div>
      <div class="card" id="shop">
        <i class="fas fa-store card-icon"></i>
        <h2>Shop</h2>
      </div>
      <div class="card" id="inventory">
        <i class="fas fa-boxes-stacked card-icon"></i>
        <h2>Inventory</h2>
      </div>
      <div class="card" id="leaderboard">
        <i class="fas fa-ranking-star card-icon"></i>
        <h2>Leaderboard</h2>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
