<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warrior's Realm</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a2d9d5c6a0.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header -->
  <header class="game-header">
    <h1 class="title-glow">🔥 Warrior's Realm 🔥</h1>

    <!-- Row 2: User, Notifications, Messages -->
    <div class="header-icons">
      <a href="profile.html"><i class="fas fa-user-astronaut"></i> Profile</a>
      <a href="notifications.html"><i class="fas fa-bell"></i> Notifications <span class="badge">3</span></a>
      <a href="messages.html"><i class="fas fa-envelope"></i> Messages <span class="badge">5</span></a>
    </div>

    <!-- Row 3: Stats -->
    <div class="stat-icons">
      <div class="stat-card glow-red">
        <i class="fas fa-bolt"></i>
        <span>Power: <strong>1720</strong></span>
      </div>
      <div class="stat-card glow-blue">
        <i class="fas fa-level-up-alt"></i>
        <span>Level: <strong>12</strong></span>
      </div>
      <div class="stat-card glow-yellow">
        <i class="fas fa-star"></i>
        <span>Skill: <strong>8</strong></span>
      </div>
    </div>
  </header>

  <!-- Main Navigation Cards -->
  <main class="card-container">
    <a href="rewards.html" class="nav-card">
      <i class="fas fa-gift"></i><span>Daily Rewards</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="boss.html" class="nav-card">
      <i class="fas fa-skull-crossbones"></i><span>Boss Fight</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="pvp.html" class="nav-card">
      <i class="fas fa-crosshairs"></i><span>PvP Arena</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="shop.html" class="nav-card">
      <i class="fas fa-store"></i><span>Item Shop</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="inventory.html" class="nav-card">
      <i class="fas fa-box-open"></i><span>Inventory</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="leaderboard.html" class="nav-card">
      <i class="fas fa-crown"></i><span>Leaderboard</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="guild.html" class="nav-card">
      <i class="fas fa-users"></i><span>Guild</span><i class="fas fa-angle-right"></i>
    </a>
    <a href="guildwar.html" class="nav-card">
      <i class="fas fa-fire"></i><span>Guild War</span><i class="fas fa-angle-right"></i>
    </a>
  </main>

  <script src="script.js"></script>
</body>
</html>
