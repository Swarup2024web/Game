<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <header class="header">
    <div class="header-row1">🔥 Epic BattleZone 🔥</div>

    <div class="header-row2">
      <div class="header-icon">
        <i class="fas fa-user-circle"></i> Profile
      </div>
      <div class="header-icon">
        <i class="fas fa-envelope"></i> Messages <span class="count">4</span>
      </div>
      <div class="header-icon">
        <i class="fas fa-bell"></i> Notifications <span class="count">7</span>
      </div>
    </div>

    <div class="header-row3">
      <div class="stat-icon">
        <i class="fas fa-bolt"></i>
        <span>1850</span>
      </div>
      <div class="stat-icon">
        <i class="fas fa-star"></i>
        <span>Level 32</span>
      </div>
      <div class="stat-icon">
        <i class="fas fa-coins"></i>
        <span>SP: 120</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <a href="rewards.html" class="card"><i class="fas fa-gift"></i> Rewards <i class="fas fa-chevron-right"></i></a>
    <a href="boss.html" class="card"><i class="fas fa-skull-crossbones"></i> Boss Fight <i class="fas fa-chevron-right"></i></a>
    <a href="pvp.html" class="card"><i class="fas fa-fist-raised"></i> PvP Arena <i class="fas fa-chevron-right"></i></a>
    <a href="shop.html" class="card"><i class="fas fa-store"></i> Shop <i class="fas fa-chevron-right"></i></a>
    <a href="inventory.html" class="card"><i class="fas fa-boxes"></i> Inventory <i class="fas fa-chevron-right"></i></a>
    <a href="leaderboard.html" class="card"><i class="fas fa-trophy"></i> Leaderboard <i class="fas fa-chevron-right"></i></a>
    <a href="guild.html" class="card"><i class="fas fa-users"></i> Guild <i class="fas fa-chevron-right"></i></a>
    <a href="guildwar.html" class="card"><i class="fas fa-fire"></i> Guild War <i class="fas fa-chevron-right"></i></a>
  </main>
</body>
</html>
